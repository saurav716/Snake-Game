<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      user-select: none;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #4ade80;
      text-shadow: 0 0 16px #4ade8088;
      margin-bottom: 12px;
    }

    /* ── HUD (score + controls) ── */
    #hud {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 14px;
      font-size: 1rem;
    }

    #score-box {
      background: #1e1e2e;
      border: 1px solid #4ade8044;
      border-radius: 8px;
      padding: 6px 18px;
      font-size: 1.1rem;
    }

    #score-box span { color: #4ade80; font-weight: 700; font-size: 1.4rem; }

    /* Pause button */
    #btn-pause {
      background: #1e1e2e;
      border: 1px solid #60a5fa55;
      color: #60a5fa;
      border-radius: 8px;
      padding: 6px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #btn-pause:hover { background: #2a2a3e; box-shadow: 0 0 8px #60a5fa55; }

    /* ── Canvas wrapper ── */
    #canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px #4ade8033, 0 0 0 2px #4ade8044;
    }

    canvas { display: block; background: #111122; }

    /* ── Overlay (Game Over / Paused) ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: none;               /* hidden by default */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 20, 0.82);
      backdrop-filter: blur(4px);
      gap: 16px;
    }

    #overlay.visible { display: flex; }

    #overlay-title {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #overlay-title.gameover { color: #f87171; text-shadow: 0 0 20px #f8717188; }
    #overlay-title.paused   { color: #facc15; text-shadow: 0 0 20px #facc1588; }

    #overlay-score { font-size: 1.1rem; color: #a0a0b0; }
    #overlay-score span { color: #4ade80; font-weight: 700; }

    #btn-restart {
      margin-top: 8px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #0f0f1a;
      border: none;
      border-radius: 10px;
      padding: 10px 32px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px #4ade8055;
    }
    #btn-restart:hover { transform: scale(1.06); box-shadow: 0 6px 24px #4ade8077; }

    /* ── Speed indicator ── */
    #speed-box {
      background: #1e1e2e;
      border: 1px solid #a78bfa44;
      border-radius: 8px;
      padding: 6px 18px;
      font-size: 1.1rem;
    }
    #speed-box span { color: #a78bfa; font-weight: 700; font-size: 1.4rem; }

    /* ── Key hints ── */
    #hints {
      margin-top: 14px;
      font-size: 0.78rem;
      color: #555570;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <h1>🐍 Snake</h1>

  <div id="hud">
    <div id="score-box">Score&nbsp; <span id="score-display">0</span></div>
    <button id="btn-pause">⏸ Pause</button>
    <div id="speed-box">Speed&nbsp; <span id="speed-display">1</span></div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="game-canvas" width="400" height="400"></canvas>

    <!-- Overlay for Game Over and Pause -->
    <div id="overlay">
      <div id="overlay-title">Game Over</div>
      <div id="overlay-score">Final Score: <span id="final-score">0</span></div>
      <button id="btn-restart">▶ Play Again</button>
    </div>
  </div>

  <div id="hints">Arrow keys to move &nbsp;|&nbsp; P or Space to pause</div>

<script>
  // ─────────────────────────────────────────────
  //  Constants & configuration
  // ─────────────────────────────────────────────
  const COLS        = 20;          // grid columns
  const ROWS        = 20;          // grid rows
  const CELL        = 20;          // px per cell
  const BASE_SPEED  = 150;         // ms per tick at level 1
  const SPEED_STEP  = 8;           // ms reduction per food eaten
  const MIN_SPEED   = 60;          // fastest possible tick (ms)

  // Colours
  const COLOR_BG        = '#111122';
  const COLOR_GRID      = '#1a1a2e';
  const COLOR_SNAKE_HEAD= '#4ade80';
  const COLOR_SNAKE_BODY= '#22c55e';
  const COLOR_FOOD      = '#f87171';
  const COLOR_FOOD_GLOW = '#f8717188';

  // ─────────────────────────────────────────────
  //  DOM references
  // ─────────────────────────────────────────────
  const canvas        = document.getElementById('game-canvas');
  const ctx           = canvas.getContext('2d');
  const scoreDisplay  = document.getElementById('score-display');
  const speedDisplay  = document.getElementById('speed-display');
  const overlay       = document.getElementById('overlay');
  const overlayTitle  = document.getElementById('overlay-title');
  const finalScore    = document.getElementById('final-score');
  const btnRestart    = document.getElementById('btn-restart');
  const btnPause      = document.getElementById('btn-pause');

  // ─────────────────────────────────────────────
  //  Audio helpers (Web Audio API – no files needed)
  // ─────────────────────────────────────────────
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  /**
   * Play a short beep.
   * @param {number} freq   - frequency in Hz
   * @param {number} dur    - duration in seconds
   * @param {string} type   - oscillator type
   * @param {number} vol    - gain (0–1)
   */
  function playSound(freq, dur = 0.08, type = 'square', vol = 0.15) {
    try {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type            = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    } catch (_) { /* silently ignore if audio is blocked */ }
  }

  const sfxEat      = () => playSound(880, 0.1, 'sine',   0.2);
  const sfxDie      = () => playSound(120, 0.4, 'sawtooth', 0.25);
  const sfxPause    = () => playSound(440, 0.07, 'sine',  0.1);

  // ─────────────────────────────────────────────
  //  Game state
  // ─────────────────────────────────────────────
  let snake, dir, nextDir, food, score, speed, level;
  let gameLoop = null;   // setInterval handle
  let paused   = false;
  let running  = false;

  // ─────────────────────────────────────────────
  //  Initialise / restart
  // ─────────────────────────────────────────────
  function init() {
    // Snake starts in the middle, 3 segments long, moving right
    snake = [
      { x: 12, y: 10 },
      { x: 11, y: 10 },
      { x: 10, y: 10 },
    ];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0;
    level   = 1;
    speed   = BASE_SPEED;
    paused  = false;
    running = true;

    spawnFood();
    updateHUD();
    hideOverlay();

    // Clear any existing loop and start fresh
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);
  }

  // ─────────────────────────────────────────────
  //  Main game tick
  // ─────────────────────────────────────────────
  function tick() {
    if (paused || !running) return;

    // Commit the queued direction
    dir = { ...nextDir };

    // Calculate new head position
    const head = {
      x: snake[0].x + dir.x,
      y: snake[0].y + dir.y,
    };

    // ── Collision: walls ──
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return endGame();
    }

    // ── Collision: self ──
    if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
      return endGame();
    }

    // Move snake forward (prepend new head)
    snake.unshift(head);

    // ── Check food ──
    if (head.x === food.x && head.y === food.y) {
      score++;
      sfxEat();
      spawnFood();
      increaseSpeed();
      updateHUD();
      // Don't pop tail → snake grows
    } else {
      snake.pop(); // remove tail to keep length
    }

    draw();
  }

  // ─────────────────────────────────────────────
  //  Speed scaling
  // ─────────────────────────────────────────────
  function increaseSpeed() {
    const newSpeed = Math.max(MIN_SPEED, BASE_SPEED - score * SPEED_STEP);
    if (newSpeed !== speed) {
      speed = newSpeed;
      level = Math.floor((BASE_SPEED - speed) / SPEED_STEP) + 1;
      // Restart interval with new speed
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speed);
    }
  }

  // ─────────────────────────────────────────────
  //  Food spawning (never on snake)
  // ─────────────────────────────────────────────
  function spawnFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS),
      };
    } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
    food = pos;
  }

  // ─────────────────────────────────────────────
  //  Game over
  // ─────────────────────────────────────────────
  function endGame() {
    running = false;
    clearInterval(gameLoop);
    sfxDie();
    draw(); // draw final frame
    showOverlay('gameover');
  }

  // ─────────────────────────────────────────────
  //  Pause / resume
  // ─────────────────────────────────────────────
  function togglePause() {
    if (!running) return;
    paused = !paused;
    sfxPause();
    if (paused) {
      btnPause.textContent = '▶ Resume';
      showOverlay('paused');
    } else {
      btnPause.textContent = '⏸ Pause';
      hideOverlay();
    }
  }

  // ─────────────────────────────────────────────
  //  Overlay helpers
  // ─────────────────────────────────────────────
  function showOverlay(type) {
    overlay.classList.add('visible');
    if (type === 'gameover') {
      overlayTitle.textContent = 'Game Over';
      overlayTitle.className   = 'gameover';
      finalScore.textContent   = score;
      btnRestart.style.display = 'inline-block';
    } else {
      overlayTitle.textContent = 'Paused';
      overlayTitle.className   = 'paused';
      btnRestart.style.display = 'none';
    }
  }

  function hideOverlay() {
    overlay.classList.remove('visible');
  }

  // ─────────────────────────────────────────────
  //  HUD update
  // ─────────────────────────────────────────────
  function updateHUD() {
    scoreDisplay.textContent = score;
    speedDisplay.textContent = level;
  }

  // ─────────────────────────────────────────────
  //  Drawing
  // ─────────────────────────────────────────────
  function draw() {
    // Background
    ctx.fillStyle = COLOR_BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines (subtle)
    ctx.strokeStyle = COLOR_GRID;
    ctx.lineWidth   = 0.5;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(c * CELL, 0);
      ctx.lineTo(c * CELL, canvas.height);
      ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(0, r * CELL);
      ctx.lineTo(canvas.width, r * CELL);
      ctx.stroke();
    }

    // Food (with glow)
    ctx.shadowColor = COLOR_FOOD_GLOW;
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = COLOR_FOOD;
    drawRoundRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4, 4);
    ctx.shadowBlur  = 0;

    // Snake body (back to front so head is on top)
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      ctx.fillStyle = isHead ? COLOR_SNAKE_HEAD : COLOR_SNAKE_BODY;
      // Slight alpha fade toward tail
      ctx.globalAlpha = isHead ? 1 : Math.max(0.4, 1 - i * (0.6 / snake.length));
      drawRoundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, isHead ? 6 : 4);
    });
    ctx.globalAlpha = 1;

    // Eyes on head
    drawEyes(snake[0]);
  }

  /** Draw a rounded rectangle (filled). */
  function drawRoundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  /** Draw two small eyes on the snake head based on direction. */
  function drawEyes(head) {
    const cx = head.x * CELL + CELL / 2;
    const cy = head.y * CELL + CELL / 2;
    const offset = 3.5;

    // Determine eye positions based on movement direction
    let e1, e2;
    if (dir.x === 1)       { e1 = { x: cx + 3, y: cy - offset }; e2 = { x: cx + 3, y: cy + offset }; }
    else if (dir.x === -1) { e1 = { x: cx - 3, y: cy - offset }; e2 = { x: cx - 3, y: cy + offset }; }
    else if (dir.y === -1) { e1 = { x: cx - offset, y: cy - 3 }; e2 = { x: cx + offset, y: cy - 3 }; }
    else                   { e1 = { x: cx - offset, y: cy + 3 }; e2 = { x: cx + offset, y: cy + 3 }; }

    ctx.fillStyle = '#0f0f1a';
    [e1, e2].forEach(e => {
      ctx.beginPath();
      ctx.arc(e.x, e.y, 2, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // ─────────────────────────────────────────────
  //  Input handling
  // ─────────────────────────────────────────────
  const DIR_MAP = {
    ArrowUp:    { x:  0, y: -1 },
    ArrowDown:  { x:  0, y:  1 },
    ArrowLeft:  { x: -1, y:  0 },
    ArrowRight: { x:  1, y:  0 },
  };

  document.addEventListener('keydown', e => {
    // Pause / resume
    if (e.key === 'p' || e.key === 'P' || e.key === ' ') {
      e.preventDefault();
      togglePause();
      return;
    }

    const newDir = DIR_MAP[e.key];
    if (!newDir) return;
    e.preventDefault();

    // Prevent reversing direction (can't go directly opposite)
    if (newDir.x === -dir.x && newDir.y === -dir.y) return;

    nextDir = newDir;

    // Resume audio context on first interaction (browser policy)
    if (audioCtx.state === 'suspended') audioCtx.resume();
  });

  // Button listeners
  btnRestart.addEventListener('click', init);
  btnPause.addEventListener('click', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    togglePause();
  });

  // ─────────────────────────────────────────────
  //  Kick off
  // ─────────────────────────────────────────────
  init();
</script>
</body>
</html>
